name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  typecheck-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate route tree
        run: node scratch/generate_routes.js

      - name: Typecheck (catches admin booking RPC / update payload mismatches)
        run: bunx tsc --noEmit

      - name: Admin booking server-fn smoke test
        run: bun run scripts/test-admin-booking-types.ts

      - name: Lint
        run: bun run lint
