<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 160" preserveAspectRatio="none" fill="none" stroke="#ef4444" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round">
  <!--
    Hand-drawn lasso ellipse, more pronounced bulge on the LEFT side.
    Starts at the top-left, sweeps DOWN-LEFT (deep curve), across the
    bottom, UP-RIGHT, across the top, and overshoots slightly past the
    starting point. Drawn once via stroke-dasharray + fill="freeze".
  -->
  <path
    d="M 110 22
       C 60 18, 20 50, 14 90
       C 10 130, 80 148, 200 146
       C 320 144, 388 122, 388 80
       C 388 38, 320 18, 200 18
       C 160 18, 130 20, 115 23
       C 108 24, 155 18, 175 18"
    stroke-dasharray="1200"
    stroke-dashoffset="1200"
    vector-effect="non-scaling-stroke"
  >
    <animate
      attributeName="stroke-dashoffset"
      from="1200"
      to="0"
      dur="1.1s"
      begin="0.1s"
      fill="freeze"
      calcMode="spline"
      keySplines="0.45 0 0.2 1"
    />
  </path>
</svg>
