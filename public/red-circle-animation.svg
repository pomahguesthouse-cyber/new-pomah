<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 140" fill="none" stroke="#ef4444" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round">
  <!--
    Hand-drawn "lasso" ellipse — starts a little above the top-left,
    sweeps around clockwise, overshoots back across the start. Drawn
    once via stroke-dasharray + fill="freeze".
  -->
  <path
    d="M 60 32
       C 30 26, 18 60, 24 85
       C 32 118, 110 132, 200 128
       C 280 124, 342 110, 348 78
       C 354 46, 290 22, 200 18
       C 130 16, 70 18, 50 28
       C 45 30, 80 25, 110 24"
    stroke-dasharray="1100"
    stroke-dashoffset="1100"
  >
    <animate
      attributeName="stroke-dashoffset"
      from="1100"
      to="0"
      dur="1.1s"
      begin="0.1s"
      fill="freeze"
      calcMode="spline"
      keySplines="0.45 0 0.2 1"
    />
  </path>
</svg>
